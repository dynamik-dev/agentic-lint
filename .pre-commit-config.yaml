repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: agentic-lint-dogfood
        name: agentic-lint on its own source
        entry: scripts/dogfood.sh
        language: system
        pass_filenames: false
        always_run: true
