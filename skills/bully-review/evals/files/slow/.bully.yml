schema_version: 1

rules:
  phpstan-check:
    description: "PHP must pass PHPStan."
    engine: script
    scope: "*.php"
    severity: error
    script: "vendor/bin/phpstan analyse {file} --no-progress"

  no-db-facade:
    description: "Use repository classes, not the DB facade."
    engine: script
    scope: "*.php"
    severity: error
    script: "grep -nE 'DB::table\\(' {file} && exit 1 || exit 0"
