schema_version: 1

rules:
  no-foo:
    description: "Deprecated rule -- keeping until next cleanup."
    engine: script
    scope: "*.py"
    severity: warning
    script: "grep -nE '\\bfoo\\b' {file} && exit 1 || exit 0"

  no-bare-except:
    description: "No bare `except:` -- catch specific exception classes."
    engine: script
    scope: "*.py"
    severity: error
    script: "grep -nE '^[[:space:]]*except:[[:space:]]*$' {file} && exit 1 || exit 0"
